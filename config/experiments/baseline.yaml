name: Baseline
description: "vLLM defaults — no special optimizations, chunked prefill on by default."
gpu_type: A10G

vllm:
  model: "Qwen/Qwen3.5-4B"
  reasoning_parser: qwen3
  revision: main
  dtype: float16
  max_model_len: 8192
  max_num_seqs: 64
  gpu_memory_utilization: 0.90
  no_enable_prefix_caching: true
