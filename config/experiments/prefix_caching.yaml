name: prefix_caching
description: "Prefix caching enabled — KV reuse for repeated prompts"
gpu_type: A10G
container_idle_timeout_min: 20

vllm:
  model: "unsloth/Phi-3-mini-4k-instruct"
  revision: main
  dtype: float16
  max_model_len: 4096
  max_num_seqs: 32
  gpu_memory_utilization: 0.90
  enforce_eager: false
  enable_chunked_prefill: false
  enable_prefix_caching: true
